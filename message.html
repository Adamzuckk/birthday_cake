<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,100,150,0.2), transparent 25%),
    radial-gradient(circle at 70% 60%, rgba(255,100,150,0.15), transparent 25%),
    linear-gradient(#fff0f6,#ffd6e7);
  font-family:'Cairo',sans-serif;
  overflow:hidden;
}

/* ENVELOPE */
.envelope{
  position:relative;
  width:420px;
  height:280px;
  background:linear-gradient(135deg,#ff8fb1,#ff6fa1);
  border-radius:18px;
  cursor:pointer;
  box-shadow:0 25px 70px rgba(255,0,100,0.35);
  overflow:visible;
}

/* FLAP */
.flap{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:55%;
  background:linear-gradient(135deg,#ff6fa1,#ff4d88);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:0.8s cubic-bezier(.2,.8,.2,1);
  z-index:3;
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%) translateY(120px) scale(.9);
  width:90%;
  background:white;
  border-radius:15px;
  padding:25px;
  text-align:center;
  opacity:0;
  transition:0.8s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* OPEN */
.envelope.open .flap{
  transform:rotateX(180deg);
}

.envelope.open .letter{
  transform:translateX(-50%) translateY(-60px) scale(1);
  opacity:1;
}

/* DISAPPEAR */
.envelope.disappear{
  opacity:0;
  transform:scale(0.8);
  transition:0.5s ease;
}

.envelope.disappear .letter{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(1);
  opacity:1;
  z-index:10;
}

/* TEXT */
.text{
  font-size:18px;
  line-height:1.8;
  color:#333;
}

/* HEART BUTTON */
.heart-btn{
  margin-top:20px;
  width:70px;
  height:70px;
  background:#ff4d88;
  position:relative;
  transform:rotate(-45deg);
  cursor:pointer;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.heart-btn::before,
.heart-btn::after{
  content:"";
  width:70px;
  height:70px;
  background:#ff4d88;
  border-radius:50%;
  position:absolute;
}

.heart-btn::before{
  top:-35px;
  left:0;
}

.heart-btn::after{
  left:35px;
  top:0;
}

.heart-btn:hover{
  transform:rotate(-45deg) scale(1.1);
}

/* TEXT INSIDE HEART */
.heart-text{
  transform:rotate(45deg);
  color:white;
  font-size:14px;
  font-weight:bold;
  z-index:2;
}

/* LINK */
.heart-link{
  display:inline-block;
}

/* FINAL MESSAGE */
.final-message{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:10;
}

.final-message.show{
  display:block;
}

</style>
</head>

<body>

<div class="envelope" id="envelope">
  <div class="flap"></div>

  <div class="letter">
    <div class="text">
      kol sana w 2nta tayeb ya my little pepsi <br>
      w 3okbal milion sana w 2nty f 2lbe <br>
      luv u sooooooooooooooo much ❤️
    </div>

    <a href="memories.html" class="heart-link">
      <div class="heart-btn">
        <span class="heart-text">click</span>
      </div>
    </a>
  </div>
</div>

<div class="final-message" id="finalMessage">
  <div class="text">
    kol sana w 2nta tayeb ya my little pepsi <br>
    w 3okbal milion sana w 2nty f 2lbe <br>
    luv u sooooooooooooooo much ❤️
  </div>

  <a href="memories.html" class="heart-link">
    <div class="heart-btn">
      <span class="heart-text">click</span>
    </div>
  </a>
</div>

<script>
const envelope = document.getElementById("envelope");
const finalMessage = document.getElementById("finalMessage");

envelope.addEventListener("click", () => {
  envelope.classList.add("disappear");
  setTimeout(() => {
    envelope.style.display = "none";
    finalMessage.classList.add("show");
  }, 500); // بعد الانتقال
});
</script>

</body>
</html>
