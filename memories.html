<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fcf5d0;
            height: 100vh;
            overflow-x: hidden;
        }
        .scroll-content {
            height: 300vh; /* Long content to allow scrolling */
        }
        :root {
            --sep-width: 270px; /* desktop size */
            --sep-z: 9999;
        }
        .sep-scroll-item {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sep-width);
            height: auto;
            z-index: var(--sep-z);
            pointer-events: none;
            opacity: 0; /* JS controls visibility */
            will-change: transform, opacity;
        }
        .sep-scroll-item img {
            width: 100%;
            height: auto;
            display: block;
            transform-origin: 50% 50%;
            will-change: transform;
            backface-visibility: hidden;
        }
        @media (max-width: 768px) {
            :root {
                --sep-width: 160px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .sep-scroll-item,
            .sep-scroll-item img {
                will-change: auto;
                transition: none !important;
            }
        }
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .frame {
            width: 350px;
            padding: 15px;
            background: white;
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
            margin: 0 auto;
        }
        .frame:hover {
            transform: scale(1.03);
        }
        .frame img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        .frame .caption {
            margin-top: 10px;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }
        .frame input[type="file"] {
            display: none;
        }
        .frame button {
            margin-top: 12px;
            padding: 8px 15px;
            border: none;
            background: #ff0000;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .frame button:hover {
            background: #cc0000;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .scroll-tip {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 999;
            display: none;
            width: 140px;
            padding: 16px 12px;
            background: rgba(255,255,255,0.96);
            border: 2px solid rgba(255,0,0,0.18);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
            text-align: center;
            color: #c40000;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.0;
        }
        .scroll-tip span {
            display: block;
        }
        .scroll-tip.show {
            display: block;
            animation: pop-up 0.35s ease;
        }
        @keyframes pop-up {
            from { opacity: 0; transform: translateY(16px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #cc0000;
        }
        .footer-banner {
            width: 100%;
            background-color: purple;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 18px;
            margin-top: 20px;
        }
        .footer-banner p {
            margin: 0 0 10px 0;
        }
        .social-logos {
            font-size: 24px;
        }
        .header-name {
            font-size: 60px;
            font-weight: bold;
            color: #ff0000;
            text-align: center;
            padding: 30px 0;
            margin: 0;
            font-family: 'Brush Script MT', cursive;
        }
        .signature {
            font-family: 'Brush Script MT', cursive;
            font-size: 24px;
            color: #ff0000;
        }
        .envelope {
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }
        .envelope summary {
            cursor: pointer;
            font-weight: bold;
        }
        .envelope textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
        }
        .text-above textarea {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
        }
        .content {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1 class="header-name">habiba</h1>
    <div class="scroll-content"></div>
    <div class="gallery">
        <div class="frame">
            <img src="frames/1.jpeg" alt="Frame 1">
        </div>
        <div class="frame">
            <img src="frames/2.jpeg" alt="Frame 2">
        </div>
        <div class="frame">
            <img src="frames/3.jpeg" alt="Frame 3">
        </div>
        <div class="frame">
            <img src="frames/4.jpeg" alt="Frame 4">
        </div>
        <div class="frame">
            <img src="frames/5.jpeg" alt="Frame 5">
        </div>
        <div class="frame">
            <img src="frames/6.jpeg" alt="Frame 6">
        </div>
        <div class="frame">
            <img src="frames/7.jpeg" alt="Frame 7">
        </div>
        <div class="frame">
            <img src="frames/8.jpeg" alt="Frame 8">
        </div>
        <div class="frame">
            <img src="frames/9.jpeg" alt="Frame 9">
        </div>
        <div class="frame">
            <img src="frames/10.jpeg" alt="Frame 10">
        </div>
    </div>
    <div class="scroll-tip" id="scrollTip"><span>our</span><span>memories</span></div>
    <button onclick="window.location.href='final.html'">Click Me</button>
    <div id="sep-flower-scroll" class="sep-scroll-item sep-scroll-flower" aria-hidden="true">
        <img src="https://cdn.shopify.com/s/files/1/0718/4370/9118/files/flower-removebg-preview.png?v=1763640802" alt="" loading="eager" decoding="async">
    </div>

    <script>
        (function() {
            var el = document.getElementById('sep-flower-scroll');
            if (!el) return;
            var img = el.querySelector('img');
            if (!img) return;

            var spinSpeed = 0.25; // degrees per pixel
            var dir = 1; // 1 = clockwise

            function getVarPx(name, fallback) {
                var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
                var n = parseFloat(v);
                return isNaN(n) ? fallback : n;
            }

            function docMetrics() {
                var vw = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
                var vh = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
                var docH = Math.max(
                    document.body.scrollHeight, document.documentElement.scrollHeight,
                    document.body.offsetHeight, document.documentElement.offsetHeight,
                    document.body.clientHeight, document.documentElement.clientHeight
                );
                return { vw: vw, vh: vh, maxScroll: Math.max(1, docH - vh) };
            }

            var dims = docMetrics();
            var elemW = getVarPx('--sep-width', 220);
            var ticking = false;

            function paint() {
                dims = docMetrics();
                elemW = getVarPx('--sep-width', 220);

                var y = window.pageYOffset || document.documentElement.scrollTop || 0;
                var pGlobal = Math.min(1, Math.max(0, y / dims.maxScroll)); // 0..1

                // Flower segment: 0 → 1.0 (full scroll)
                var start = 0.0;
                var end = 1.0;
                var segSpan = end - start;
                var pSeg = (pGlobal - start) / segSpan;

                if (pSeg <= 0 || pSeg > 1) {
                    el.style.opacity = 0;
                    ticking = false;
                    return;
                }

                pSeg = Math.min(1, Math.max(0, pSeg));
                el.style.opacity = 1;

                // Path: off-screen top-left → bottom-right
                var xStart = -elemW; // off left
                var yStart = -elemW; // off top
                var xEnd = dims.vw; // beyond right-bottom corner
                var yEnd = dims.vh;

                var tx = xStart + (xEnd - xStart) * pSeg;
                var ty = yStart + (yEnd - yStart) * pSeg;

                el.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';

                // Oscillating rotation (left and right)
                var angle = Math.sin((y * spinSpeed) / 100) * 45;
                img.style.transform = 'rotate(' + angle + 'deg)';

                ticking = false;
            }

            function onScroll() {
                if (!ticking) {
                    ticking = true;
                    requestAnimationFrame(paint);
                }
            }
            function onResize() {
                requestAnimationFrame(paint);
            }

            paint();
            window.addEventListener('scroll', onScroll, { passive: true });
            window.addEventListener('resize', onResize, { passive: true });
        })();

        var scrollTip = document.getElementById('scrollTip');
        var lastScroll = 0;
        window.addEventListener('scroll', function() {
            var scrollY = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollY > 120 && scrollY > lastScroll) {
                scrollTip.classList.add('show');
            } else if (scrollY < 120) {
                scrollTip.classList.remove('show');
            }
            lastScroll = scrollY;
        }, { passive: true });

        document.querySelectorAll('.frame input[type="file"]').forEach(function(input) {
            input.addEventListener('change', function() {
                var file = this.files[0];
                if (!file) return;
                var reader = new FileReader();
                var frame = this.closest('.frame');
                var img = frame.querySelector('img');
                reader.onload = function(e) {
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
    <div class="footer-banner">
        <p>all of this created by ENG/ADAM.A</p>
    </div>
</body>
</html>
